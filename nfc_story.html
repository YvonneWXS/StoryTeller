<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>storyteller</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: relative;
            background-color: #000;
            /* Fallback background color */
        }

        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('Theresa.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        .card {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 2rem;
            border-radius: 10px;
            text-align: center;
            max-width: 90%;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 1rem;
        }

        p {
            color: #666;
            line-height: 1.5;
        }

        /* Transparent overlay button for audio playback */
        #audio-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            z-index: 9999;
            cursor: pointer;
            display: none;
            /* Initially hidden */
        }

        /* Audio element */
        #bg-audio {
            display: none;
        }
    </style>
</head>

<body>
    <div class="background"></div>


    <button id="audio-overlay"></button>
    <audio id="bg-audio" loop>
        <source src="storyteller.mp3" type="audio/mpeg">
    </audio>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const audio = document.getElementById('bg-audio');
            const overlay = document.getElementById('audio-overlay');

            // Try to play audio automatically on page load
            const playPromise = audio.play();

            if (playPromise !== undefined) {
                playPromise.then(function () {
                    // Auto-play succeeded
                    console.log('Audio auto-played successfully');
                }).catch(function (error) {
                    // Auto-play failed - show overlay button
                    console.log('Auto-play blocked, showing overlay:', error);
                    overlay.style.display = 'block';

                    // Add event listener to overlay button for user interaction
                    overlay.addEventListener('click', function () {
                        audio.play()
                            .then(function () {
                                // Successfully played - hide overlay
                                overlay.style.display = 'none';
                                console.log('Audio played after user interaction');
                            })
                            .catch(function (err) {
                                console.error('Failed to play audio:', err);
                            });

                        // Remove the event listener to prevent multiple plays
                        overlay.removeEventListener('click', arguments.callee);
                    });
                });
            } else {
                // For older browsers that don't return a promise
                overlay.style.display = 'block';

                overlay.addEventListener('click', function () {
                    audio.play();
                    overlay.style.display = 'none';
                });
            }
        });
    </script>
</body>

</html>
